# Pre-commit hooks: ruff (lint, with autofix) + ruff-format.
# Install once with:  uv run pre-commit install
# Run on all files:   uv run pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
