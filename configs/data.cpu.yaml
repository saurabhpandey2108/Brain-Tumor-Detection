# Data config for CPU proof runs: smaller images and the fast naive split.
root: Dataset
classes: [glioma, meningioma, notumor, pituitary]
image_size: 128          # 128 = 8x16 patches; ~3x cheaper than 224 on CPU

# naive (random) split avoids the O(n^2) perceptual-hash grouping so the proof
# run starts immediately. NOT leakage-free — use the phash split for real results.
split_strategy: naive

phash_hash_size: 8
phash_distance: 5

test_fraction: 0.2
val_fraction: 0.1
exclude_list: null
